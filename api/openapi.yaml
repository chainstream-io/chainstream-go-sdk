        explode: true
        in: query
        name: amount
        required: true
        schema:
          example: 1000000000
          type: string
        style: form
      - description: DTO.DEX.QUOTE.INPUT_MINT
        explode: true
        in: query
        name: inputMint
        required: true
        schema:
