openapi: 3.1.0
info:
  contact:
    email: ai@sx.ai
    name: AI
    url: https://github.com/chainstream-io/dex
  description: Dex Aggregator API ⚡️
  title: Dex Aggregator API
  version: "1.0"
servers:
- url: https://api-dex.chainstream.io
tags:
- description: ""
  name: Endpoints
paths:
  /jobs/{id}:
    get:
      description: Retrieve the current status and result of a job by its ID
      operationId: get
      parameters:
      - description: Job identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: "12345"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDTO"
          description: Job status retrieved successfully
      security:
      - bearer: []
      summary: Job - Get
      tags:
      - Jobs
  /jobs/{id}/streaming:
    get:
      description: Subscribe to real-time job status updates via Server-Sent Events
        (SSE). The connection will remain open until the job completes or an error
        occurs
      operationId: streaming
      parameters:
      - description: Job identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          example: "12345"
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobStreamingDTO"
          description: SSE stream established successfully
      security:
      - bearer: []
      summary: Job - Streaming
      tags:
      - Jobs
  /v1/ipfs/presign:
    post:
      description: Create a Presign URL for IPFS content
      operationId: presign
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                type: string
          description: ""
      security:
      - bearer: []
      summary: IPFS - Presign
      tags:
      - Ipfs
  /v1/blockchain:
    get:
      description: Get list of supported blockchains
      operationId: get.supported.blockchains
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BlockchainDTO"
                type: array
          description: ""
      security:
      - bearer: []
      summary: Blockchain - List
      tags:
      - Blockchain
  /v1/blockchain/{chain}/latest_block:
    get:
      description: Get the latest block information for a specific blockchain
      operationId: get.latest.block
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockchainLatestBlockDTO"
          description: ""
      security:
      - bearer: []
      summary: Blockchain - Latest Block
      tags:
      - Blockchain
  /v1/transaction/{chain}/send:
    post:
      description: Submit a signed transaction to the blockchain
      operationId: send
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          example:
            SOLANA: sol
            BASE: base
            BSC: bsc
            POLYGON: polygon
            ARBITRUM: arbitrum
            OPTIMISM: optimism
            AVALANCHE: avalanche
            ETHEREUM: eth
            ZKSYNC: zksync
            SUI: sui
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendTxInput"
        description: Transaction parameters
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendTxResponse"
          description: ""
      security:
      - bearer: []
      summary: Transaction - Send
      tags:
      - Transaction
  /v1/transaction/{chain}/gas-price:
    get:
      description: Get the current gas price for the specified chain
      operationId: get.gasPrice
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          enum:
          - base
          - bsc
          - polygon
          - arbitrum
          - optimism
          - avalanche
          - eth
          - zksync
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GasPriceResponse"
          description: ""
      security:
      - bearer: []
      summary: Transaction - Get Gas Price
      tags:
      - Transaction
  /v1/transaction/{chain}/estimate-gas-limit:
    post:
      description: Estimate the gas limit required for a transaction
      operationId: estimate.gasLimit
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          enum:
          - base
          - bsc
          - polygon
          - arbitrum
          - optimism
          - avalanche
          - eth
          - zksync
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateGasLimitInput"
        description: Transaction parameters for gas estimation
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateGasLimitResponse"
          description: ""
      security:
      - bearer: []
      summary: Transaction - Estimate Gas Limit
      tags:
      - Transaction
  /v1/dex/{chain}/swap:
    post:
      description: "Swap parameters including input token, output token, amount and\
        \ slippage"
      operationId: swap
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapReply"
          description: ""
      security:
      - bearer: []
      summary: Dex - Swap
      tags:
      - Dex
  /v1/dex/{chain}/route:
    post:
      description: Calculate the best route for token swap considering price impact
        and fees. Returns the optimal path and a prepared transaction.
      operationId: route
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapRouteInput"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapRouteResponse"
          description: ""
      security:
      - bearer: []
      summary: Dex - Route
      tags:
      - Dex
  /v1/dex/{chain}/quote:
    get:
      description: Get DEX trading quote information
      operationId: quote
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      - description: DEX protocol type
        explode: true
        in: query
        name: dex
        required: true
        schema:
          enum:
          - raydium
          - pumpfun
          example: raydium
          type: string
        style: form
      - description: Trading amount
        explode: true
        in: query
        name: amount
        required: true
        schema:
          example: 1000000000
          type: string
        style: form
      - description: Input token address
        explode: true
        in: query
        name: inputMint
        required: true
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: form
      - description: Output token address
        explode: true
        in: query
        name: outputMint
        required: true
        schema:
          example: So11111111111111111111111111111111111111112
          type: string
        style: form
      - description: Exact input mode
        explode: true
        in: query
        name: exactIn
        required: true
        schema:
          default: true
          example: true
          type: boolean
        style: form
      - description: Slippage tolerance
        explode: true
        in: query
        name: slippage
        required: true
        schema:
          example: 10
          format: int64
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteResponse"
          description: ""
      security:
      - bearer: []
      summary: Dex - Get Quote
      tags:
      - Dex
  /v1/dex/{chain}/create:
    post:
      description: Create a new token on the specified DEX
      operationId: create.token
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenInput"
        description: Token creation parameters
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateTokenReply"
          description: ""
      security:
      - bearer: []
      summary: Dex - Create Token
      tags:
      - Dex
  /v1/dex:
    get:
      description: Obtain information about all DEXs on a specified blockchain.
      operationId: list.dex
      parameters:
      - explode: true
        in: query
        name: chains
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Number of results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          format: int64
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: dex program address
        explode: true
        in: query
        name: dexProgram
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DexPage"
          description: ""
      security:
      - bearer: []
      summary: Dex - List
      tags:
      - Dex
  /v1/solana/moonshot/create:
    post:
      description: Create a new token with Moonshot protocol on Solana
      operationId: moonshot.create.token
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoonshotCreateTokenInput"
        description: Token creation parameters
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MoonshotCreateTokenReply"
          description: ""
      security:
      - bearer: []
      summary: Moonshot - Create Token
      tags:
      - Defi/solana/Moonshot
  /v1/solana/moonshot/submitCreateToken:
    post:
      description: Submit a signed token creation transaction to finalize token creation
        with Moonshot
      operationId: moonshot.submit.create.token
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoonshotSubmitCreateTokenInput"
        description: Signed transaction and token details
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/moonshot_submit_create_token_200_response"
          description: Token creation transaction submitted successfully
      security:
      - bearer: []
      summary: Moonshot - Submit Create Token
      tags:
      - Defi/solana/Moonshot
  /v1/solana/pumpfun/create:
    post:
      description: Create a new token with PumpFun protocol
      operationId: pumpfun.create.token
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PumpCreateTokenInput"
        description: Required parameters for minting token
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PumpCreateTokenReply"
          description: ""
      security:
      - bearer: []
      summary: PumpFun - Create Token
      tags:
      - Defi/solana/Pumpfun
  /v1/trade/{chain}:
    get:
      description: Retrieve a list of transactions
      operationId: get.trades
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      - description: Pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Number of results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: number
        style: form
      - description: Pagination direction (next or prev)
        explode: true
        in: query
        name: direction
        required: false
        schema:
          default: next
          enum:
          - next
          - prev
          type: string
        style: form
      - description: Token address to query trades
        explode: true
        in: query
        name: tokenAddress
        required: false
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: form
      - description: Wallet address to query trades
        explode: true
        in: query
        name: walletAddress
        required: false
        schema:
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
          type: string
        style: form
      - description: Pool address to filter trades
        explode: true
        in: query
        name: poolAddress
        required: false
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: form
      - description: Start timestamp for filtering trades (Unix epoch in seconds)
        explode: true
        in: query
        name: beforeTimestamp
        required: false
        schema:
          example: 1717334400000
          format: int64
          type: integer
        style: form
      - description: End timestamp for filtering trades (Unix epoch in seconds)
        explode: true
        in: query
        name: afterTimestamp
        required: false
        schema:
          example: 1717334400000
          format: int64
          type: integer
        style: form
      - description: Filter trades before this block height
        explode: true
        in: query
        name: beforeBlockHeight
        required: false
        schema:
          example: 332417228
          format: int64
          type: integer
        style: form
      - description: Filter trades after this block height
        explode: true
        in: query
        name: afterBlockHeight
        required: false
        schema:
          example: 332417228
          format: int64
          type: integer
        style: form
      - description: Transaction signature/hash
        explode: true
        in: query
        name: transactionsSignature
        required: false
        schema:
          example: "37XpPt9Ak6JiE1V3sftJDtdUsvR9FVFRqkZmoT3dp4BTD9pgyTWn1XgHH6R7NjuJ4pBMAgj8JvZtxQrf4s6NTC5F,3QF8Fn4ReoEjQhfZHvJy8ykodBJRZktcP21j1bQ8aM6uFXQV1CuqUoPDLNGJpkUC6bLhghxWcf54VYzRaPM66GwH"
          type: string
        style: form
      - description: Trade type
        explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - BUY
          - SELL
          example: BUY
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradePage"
          description: ""
      security:
      - bearer: []
      summary: Trade - List
      tags:
      - Trade
  /v1/trade/{chain}/activities:
    get:
      description: "Get token activities including trades, liquidity operations, and\
        \ other token-related activities"
      operationId: get.activities
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      - description: Pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Number of results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          maximum: 100
          minimum: 1
          type: number
        style: form
      - description: Pagination direction (next or prev)
        explode: true
        in: query
        name: direction
        required: false
        schema:
          default: next
          enum:
          - next
          - prev
          type: string
        style: form
      - description: Token address to query trades
        explode: true
        in: query
        name: tokenAddress
        required: false
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: form
      - description: Wallet address to query trades
        explode: true
        in: query
        name: walletAddress
        required: false
        schema:
          example: 3xd4LGVWtYXLBspR6X5JWbW49NXmEehfPtX6Kqx98b4w
          type: string
        style: form
      - description: Pool address to filter trades
        explode: true
        in: query
        name: poolAddress
        required: false
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: form
      - description: Start timestamp for filtering trades (Unix epoch in seconds)
        explode: true
        in: query
        name: beforeTimestamp
        required: false
        schema:
          example: 1717334400000
          format: int64
          type: integer
        style: form
      - description: End timestamp for filtering trades (Unix epoch in seconds)
        explode: true
        in: query
        name: afterTimestamp
        required: false
        schema:
          example: 1717334400000
          format: int64
          type: integer
        style: form
      - description: Filter trades before this block height
        explode: true
        in: query
        name: beforeBlockHeight
        required: false
        schema:
          example: 332417228
          format: int64
          type: integer
        style: form
      - description: Filter trades after this block height
        explode: true
        in: query
        name: afterBlockHeight
        required: false
        schema:
          example: 332417228
          format: int64
          type: integer
        style: form
      - description: Transaction signature/hash
        explode: true
        in: query
        name: transactionsSignature
        required: false
        schema:
          example: "37XpPt9Ak6JiE1V3sftJDtdUsvR9FVFRqkZmoT3dp4BTD9pgyTWn1XgHH6R7NjuJ4pBMAgj8JvZtxQrf4s6NTC5F,3QF8Fn4ReoEjQhfZHvJy8ykodBJRZktcP21j1bQ8aM6uFXQV1CuqUoPDLNGJpkUC6bLhghxWcf54VYzRaPM66GwH"
          type: string
        style: form
      - description: Activity type
        explode: true
        in: query
        name: type
        required: false
        schema:
          enum:
          - BUY
          - SELL
          - LIQUIDITY_INITIALIZE
          - LIQUIDITY_ADD
          - LIQUIDITY_REMOVE
          - RED_PACKET_CREATE
          - RED_PACKET_CLAIM
          - RED_PACKET_COMPLETE
          - RED_PACKET_REFUND
          example: BUY
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradePage"
          description: ""
      security:
      - bearer: []
      summary: Activity - List
      tags:
      - Trade
  /v1/trade/{chain}/top-traders:
    get:
      description: Get top traders for a specific token
      operationId: get.top.traders
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      - description: Pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Maximum number of top traders to return (max 10)
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          format: int64
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Pagination direction (next or prev)
        explode: true
        in: query
        name: direction
        required: false
        schema:
          default: next
          enum:
          - next
          - prev
          type: string
        style: form
      - description: Token address to query trades
        explode: true
        in: query
        name: tokenAddress
        required: true
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: form
      - description: Time frame for filtering trades
        explode: true
        in: query
        name: timeFrame
        required: false
        schema:
          default: 24h
          enum:
          - 30m
          - 1h
          - 2h
          - 4h
          - 6h
          - 8h
          - 12h
          - 24h
          example: 24h
          type: string
        style: form
      - description: Sort type for trade results
        explode: true
        in: query
        name: sortType
        required: false
        schema:
          default: desc
          enum:
          - desc
          - asc
          example: desc
          type: string
        style: form
      - description: Field to sort trades by
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          default: tradeAmount
          enum:
          - tradeAmount
          - tradeCount
          example: tradeAmount
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TopTradersPage"
          description: ""
      security:
      - bearer: []
      summary: Trade - Top Traders
      tags:
      - Trade
  /v1/token/search:
    get:
      description: Search token information by criteria
      operationId: search
      parameters:
      - description: Chain filter
        explode: true
        in: query
        name: chains
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: "Search query string for token name, symbol or address"
        explode: true
        in: query
        name: q
        required: false
        schema:
          example: USDC
          minLength: 1
          type: string
        style: form
      - description: Number of results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 20
          format: int64
          maximum: 100
          minimum: 1
          type: integer
        style: form
      - description: Sort direction
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
        style: form
      - description: "Protocol filter, for supported protocols please check the dexName\
          \ values returned by DEX - List"
        explode: true
        in: query
        name: protocols
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Pagination cursor
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Field to sort by
        explode: true
        in: query
        name: sortBy
        required: false
        schema:
          enum:
          - marketCapInUsd
          - liquidityInUsd
          - priceInUsd
          - holderCount
          - h24VolumeInUsd
          - h24Transactions
          - tokenCreatedAt
          example: priceInUsd
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenPage"
          description: ""
      security:
      - bearer: []
