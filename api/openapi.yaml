    get:
      description: "Retrieve historical liquidity snapshots for a token. If a time\
        \ parameter is provided, returns the nearest snapshot before or at that time."
      operationId: get.token.liquidity.snapshots
      parameters:
      - description: A chain name listed in supported networks
        explode: false
        in: path
        name: chain
        required: true
        schema:
          $ref: "#/components/schemas/ChainSymbol"
        style: simple
      - description: An address of a token
        explode: false
        in: path
        name: tokenAddress
        required: true
        schema:
          example: 6p6xgHyF7AeE6TZkSmFsko444wqoP15icUSqi2jfGiPN
          type: string
        style: simple
      - description: Target Unix timestamp (seconds) for snapshot query. Returns the
          nearest snapshot before or at this time.
        explode: true
        in: query
        name: time
        required: false
        schema:
