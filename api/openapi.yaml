components:
  schemas:
    JobDTO:
      example:
        result:
          success: true
          data:
            message: Job completed successfully
        state: completed
      properties:
        state:
          description: Job state
          example: completed
          type: string
        result:
          description: Job result
          example:
            success: true
            data:
              message: Job completed successfully
          type: object
      required:
      - result
      - state
    JobStreamingDTO:
      example:
        data:
          id: 5rKfmXQyMhz7F2zRE6SpWWx3YkSxtA4gFqZD8CwGRYMx5YLTB8NhbiM9xEHG9jruiWdUyUz7Fpz8jmB8SKcjsLqe
          status: completed
          result:
            success: true
            data:
              message: Job completed successfully
        id: 1
      properties:
        id:
          description: Streaming job ID
          example: 1
          type: number
        data:
          description: Streaming data
          example:
            id: 5rKfmXQyMhz7F2zRE6SpWWx3YkSxtA4gFqZD8CwGRYMx5YLTB8NhbiM9xEHG9jruiWdUyUz7Fpz8jmB8SKcjsLqe
            status: completed
            result:
              success: true
              data:
                message: Job completed successfully
          type: object
      required:
      - data
      - id
    BlockchainDTO:
      example:
        symbol: SOL
        chainId: 1
        explorerUrl: https://explorer.solana.com
        name: Solana
      properties:
        symbol:
          description: Blockchain symbol
          example: SOL
          type: string
        name:
          description: Blockchain name
          example: Solana
          type: string
        explorerUrl:
          description: Blockchain explorer URL
          example: https://explorer.solana.com
          type: string
        chainId:
          description: Blockchain chain ID
          example: 1
          format: int64
          type: integer
      required:
      - chainId
      - explorerUrl
      - name
      - symbol
    ChainSymbol:
      enum:
      - sol
      - base
      - bsc
      - polygon
      - arbitrum
      - optimism
      - avalanche
      - eth
      - zksync
      - sui
      type: string
    BlockchainLatestBlockDTO:
      example:
        blockhash: "123"
        lastValidBlockHeight: 123
      properties:
        blockhash:
          description: Latest block hash
          example: "123"
          type: string
        lastValidBlockHeight:
          description: Last valid block height
          example: 123
          format: int64
          type: integer
      required:
      - blockhash
      - lastValidBlockHeight
    SendTxInput:
      example:
        submitType: default
        signedTx: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRgYGpQEDAQIABQcICQoLDA0ODwAAAAAAAAAAAAAQERITFBUWFxgZGhscHR4fAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
        options:
          isAntiMev: true
      properties:
        signedTx:
          description: Base64 encoded signed transaction
          example: AQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABAAEDRgYGpQEDAQIABQcICQoLDA0ODwAAAAAAAAAAAAAQERITFBUWFxgZGhscHR4fAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          type: string
        submitType:
          description: Transaction submission method
          enum:
          - default
          - priority
          example: default
          type: string
        options:
          description: jito | direct
          example:
            isAntiMev: true
          type: object
      required:
      - signedTx
    SendTxResponse:
      example:
        jobId: "1234567890"
        signature: 37XpPt9Ak6JiE1V3sftJDtdUsvR9FVFRqkZmoT3dp4BTD9pgyTWn1XgHH6R7NjuJ4pBMAgj8JvZtxQrf4s6NTC5F
        elapsedTime: 1500
      properties:
        signature:
          description: Transaction signature/hash
          example: 37XpPt9Ak6JiE1V3sftJDtdUsvR9FVFRqkZmoT3dp4BTD9pgyTWn1XgHH6R7NjuJ4pBMAgj8JvZtxQrf4s6NTC5F
          type: string
        elapsedTime:
          description: Transaction processing time in milliseconds
          example: 1500
          format: int64
          type: integer
        jobId:
          description: job id
          example: "1234567890"
          type: string
      required:
      - elapsedTime
      - jobId
      - signature
    GasPriceResponse:
      example:
        chain: ethereum
        gasPrice: 0x5d21dba00
      properties:
        gasPrice:
          description: Current gas price in wei (hex string)
          example: 0x5d21dba00
          type: string
        chain:
          description: Chain symbol
          example: ethereum
          type: string
      required:
      - chain
      - gasPrice
    EstimateGasLimitInput:
      example:
        data: 0xa9059cbb000000000000000000000000742d35cc6634c0532925a3b8d8c9c4b8a8d4c8b80000000000000000000000000000000000000000000000000de0b6b3a7640000
        from: 0x742d35Cc6634C0532925a3b8D8C9C4b8a8d4C8b8
        to: 0x742d35Cc6634C0532925a3b8D8C9C4b8a8d4C8b8
        value: 0x0
      properties:
        from:
          description: From address
          example: 0x742d35Cc6634C0532925a3b8D8C9C4b8a8d4C8b8
          type: string
        to:
          description: To address
          example: 0x742d35Cc6634C0532925a3b8D8C9C4b8a8d4C8b8
          type: string
        data:
          description: Transaction data (hex)
          example: 0xa9059cbb000000000000000000000000742d35cc6634c0532925a3b8d8c9c4b8a8d4c8b80000000000000000000000000000000000000000000000000de0b6b3a7640000
          type: string
        value:
          description: "Value to send (in wei, hex string)"
          example: 0x0
          type: string
      required:
      - data
      - from
      - to
    EstimateGasLimitResponse:
      example:
        gasLimit: 0x5208
        chain: ethereum
      properties:
        gasLimit:
          description: Estimated gas limit (hex string)
          example: 0x5208
          type: string
        chain:
          description: Chain symbol
          example: ethereum
          type: string
      required:
      - chain
      - gasLimit
    SwapInput:
      example:
        userAddress: oQPnhXAbLbMuKHESaGrbXT17CyvWCpLyERSJA9HCYd7
        amount: "1000000000"
        dex: raydium
        priorityFee: "1000"
        inputMint: inputMint
        swapMode: ExactIn
        poolAddress: 58oQChx4yWmvKdwLLZzBi4ChoCc2fqCUWBkwMihLYQo2
        slippage: 10
        outputMint: outputMint
      properties:
        dex:
          description: DEX identifier for the trade
          enum:
          - raydium
          - pumpfun
          - moonshot
          - candy
          - launchpad
          example: raydium
          type: string
        userAddress:
          description: Public key of the wallet initiating the transaction
          example: oQPnhXAbLbMuKHESaGrbXT17CyvWCpLyERSJA9HCYd7
          maxLength: 64
          minLength: 8
          type: string
        priorityFee:
          description: Priority fee in SOL to increase transaction processing speed
          example: "1000"
          type: string
