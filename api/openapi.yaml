          - marketData.top10HoldingsRatio
          - marketData.top100TotalHoldings
          - marketData.top100HoldingsRatio
          - marketData.holders
          - marketData.creatorHoldings
          - marketData.creatorHoldingsRatio
          - stats.buys1m
          - stats.buys5m
          - stats.buys15m
          - stats.buys30m
          - stats.buys1h
          - stats.buys4h
          - stats.buys24h
          - stats.sells1m
          - stats.sells5m
          - stats.sells15m
          - stats.sells30m
          - stats.sells1h
          - stats.sells4h
          - stats.sells24h
          - stats.trades1m
          - stats.trades5m
          - stats.trades1h
          - stats.trades4h
          - stats.trades24h
          - stats.traders1m
          - stats.traders5m
          - stats.traders1h
          - stats.traders4h
          - stats.traders24h
          - stats.volumesInUsd1m
          - stats.volumesInUsd5m
          - stats.volumesInUsd1h
          - stats.volumesInUsd4h
          - stats.volumesInUsd24h
          - tokenCreatedAt
          example: marketData.marketCapInUsd
          type: string
        style: form
      - description: Sort Direction
        explode: true
        in: query
        name: sortDirection
        required: false
        schema:
          default: DESC
          enum:
          - ASC
          - DESC
          type: string
        style: form
      - description: Filter field
        explode: true
        in: query
        name: rangeFilters
        required: false
        schema:
          items:
