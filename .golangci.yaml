version: "2"
run:
  issues-exit-code: 1
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - revive
    - staticcheck
    - unused
  settings:
    perfsprint:
      strconcat: false
    revive:
      rules:
        - name: exported
          disabled: true
        - name: unused-parameter
          disabled: true
        - name: var-naming
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - godox
        text: 'Line contains TODO/BUG/FIXME:'
      - linters:
          - dupl
          - funlen
          - gochecknoglobals
          - maintidx
          - scopelint
          - testpackage
          - wrapcheck
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 0
formatters:
  enable: []
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
